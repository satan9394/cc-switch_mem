name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Check formatting
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test:unit

  backend:
    name: Backend Checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Create frontend dist placeholder
        shell: bash
        run: mkdir -p dist

      - name: Check Rust formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  windows-mem-suite:
    name: Windows MEM Suite clean-room
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: satan9394/claude-mem_local
          ref: main
          path: claude-mem-local
      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false
      - run: pnpm install --frozen-lockfile
      - working-directory: claude-mem-local
        run: npm install --no-audit --no-fund
      - name: Generate ephemeral updater key for clean-room build
        shell: pwsh
        run: |
          $Key = Join-Path $env:RUNNER_TEMP 'suite-test.key'
          npx tauri signer generate --ci --write-keys $Key
          "TAURI_SIGNING_PRIVATE_KEY=$Key" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - shell: pwsh
        run: ./scripts/suite/prepare-assets.ps1 -ClaudeMemSource ./claude-mem-local
      - run: pnpm tauri build --bundles nsis --config src-tauri/tauri.suite.conf.json
      - name: Verify isolated install
        shell: pwsh
        run: |
          $Setup = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter '*-setup.exe' | Select-Object -First 1
          ./scripts/suite/verify-installed-suite.ps1 -Installer $Setup.FullName -RunIsolatedInstall
